<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Contact Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial, sans-serif;

            background:linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e293b
            );

            color:white;
        }

        .form-container{

            width:90%;
            max-width:500px;

            padding:40px;

            background:rgba(255,255,255,0.05);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:
                0 10px 40px rgba(0,0,0,0.5);
        }

        h1{
            text-align:center;

            margin-bottom:30px;

            font-size:40px;

            background:linear-gradient(
                90deg,
                #00f5ff,
                #00ff99
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#d1d5db;
        }

        input,
        textarea{

            width:100%;

            padding:14px;

            border:none;
            outline:none;

            border-radius:10px;

            background:#1f2937;

            color:white;

            font-size:16px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            background:#00ff99;

            color:#111827;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
                0 10px 20px rgba(0,255,153,0.3);
        }

        .back{
            margin-top:20px;
            text-align:center;
        }

        .back a{
            color:#60a5fa;
            text-decoration:none;
        }

        .back a:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

    <div class="form-container">

        <h1>Contact Form ✨</h1>

        <form>

            <div class="input-group">
                <label>Name</label>

                <input
                    type="text"
                    placeholder="Enter your name"
                />
            </div>

            <div class="input-group">
                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter your email"
                />
            </div>

            <div class="input-group">
                <label>Message</label>

                <textarea
                    placeholder="Write your message..."
                ></textarea>
            </div>

            <button type="submit">
                Send Message
            </button>

        </form>

        <div class="back">
            <a href="/">
                ← Back to Home
            </a>
        </div>

    </div>

</body>
</html>
